name: lim

on:
  pull_request:
  push:

jobs:
  limits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build project
        run: |
          cmake -S . -B build
          cmake --build build -j2

      - name: Check limits
        uses: njlane314/lim@v1
        with:
          rules: .lim/rules.lim
          command: |
            ./build/my_benchmark
            printf "binary.bytes=%s\n" "$(wc -c < build/my_program)"

      - name: Upload lim artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lim-report
          path: |
            telemetry.tlm
            lim-events.jsonl
